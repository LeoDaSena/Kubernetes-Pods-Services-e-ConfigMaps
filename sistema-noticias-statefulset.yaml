apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sistema-noticias-statefulset
spec:
  serviceName: sistema-noticias
  selector:
    matchLabels:
      app: sistema-noticias
  template:
    metadata:
      labels:
        app: sistema-noticias
    spec:
      containers:
      - name: sistema-noticias
        image: alura/sistema-noticias:v1
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: sistema-noticias-config
        volumeMounts:
        - name: imagens
          mountPath: /var/www/html/uploads
        - name: sessao
          mountPath: /tmp
      volumes:
      - name: imagens
        persistentVolumeClaim:
          claimName: imagens-pvc
      - name: sessao
        persistentVolumeClaim:
          claimName: sessao-pvc